server.port=8080
server.address=127.0.0.1

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:change-me-please-set-a-long-random-string-in-environment-variables-for-production-use-only}
app.jwt.expiration-ms=604800000

# Bootstrap admin (created on first run if no admin exists)
app.bootstrap-admin.email=${ADMIN_EMAIL:}
app.bootstrap-admin.password=${ADMIN_PASSWORD:}
app.bootstrap-admin.first-name=${ADMIN_FIRST_NAME:Admin}
app.bootstrap-admin.last-name=${ADMIN_LAST_NAME:User}

logging.level.org.springframework.security=INFO
